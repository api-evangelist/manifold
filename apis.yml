aid: manifold
url: https://raw.githubusercontent.com/api-evangelist/manifold/refs/heads/main/apis.yml
name: Manifold
kind: company
description: >-
  Manifold is an NFT creator tools platform that empowers artists and developers
  to deploy their own creator-owned smart contracts, mint NFTs, and build
  custom on-chain experiences without relying on platform-specific custody.
  Founded in 2021, Manifold provides a no-code studio (Manifold Studio) for
  ERC721 and ERC1155 contract deployment, open-source Creator Core smart
  contracts, a Royalty Registry adopted by all major NFT marketplaces, and a
  Client SDK for building custom minting dApps. The platform supports Ethereum
  Mainnet, Base, Optimism, Shape, Apechain, and Sepolia testnet. Manifold also
  exposes server-side authentication APIs (Signature Grant and Authorization
  Code Grant via oauth2.manifoldxyz.dev), a Studio Apps REST API
  (apps.api.manifoldxyz.dev) for product and minting data, open-source Solidity
  extension contracts for custom mint mechanics, and a Marketplace contract
  powering auction and fixed-price listings. Gas fees are the only cost for
  creators; Manifold charges no platform fees or royalties on sales.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - NFT
  - Creator Tools
  - Smart Contracts
  - Blockchain
  - Web3
  - Ethereum
  - ERC721
  - ERC1155
  - Royalties
  - Marketplace
  - Minting
  - OpenSea
  - Base
  - Optimism
created: '2026-06-13'
modified: '2026-06-13'
